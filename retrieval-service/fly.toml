app = "detailagent-retrieval"
primary_region = "iad"

[build]
  # Uses the local Dockerfile.

[env]
  PORT = "8787"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 2

  [[http_service.checks]]
    type = "http"
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[deploy]
  strategy = "rolling"
